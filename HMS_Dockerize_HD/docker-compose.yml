services:
  mongodb:
    image: mongo:7
    container_name: hms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: hms-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/hms_docker
      SESSION_SECRET: change_this_for_marking_demo
      COOKIE_SECURE: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  seed:
    build: .
    container_name: hms-seed
    command: node seedUsers.js
    environment:
      MONGO_URI: mongodb://mongodb:27017/hms_docker
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo-data:
