<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Management | HMS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
  />

  <link rel="stylesheet" href="/style.css" />
</head>

<body class="grey lighten-4">

  <nav class="teal darken-2 hms-navbar">
    <div class="nav-wrapper container">
      <a href="/dashboard" class="brand-logo">HMS</a>

      <ul id="mainNavLinks" class="right hms-nav-links"></ul>
    </div>
  </nav>

  <main class="container" style="margin-top: 40px;">

    <div class="row">
      <div class="col s12 m6">
        <h4>Staff Management</h4>
      </div>
    </div>

    <div class="card">
      <div class="card-content">

        <span class="card-title">Create Staff</span>

        <form id="staffForm">

          <div class="input-field">
            <input id="fullName" type="text" required />
            <label for="fullName">Full Name</label>
          </div>

          <div class="input-field">
            <input id="email" type="email" required />
            <label for="email">Email</label>
          </div>

          <div class="input-field">
            <input id="password" type="password" required />
            <label for="password">Password</label>
          </div>

          <div class="input-field">
            <select id="role" required>
              <option value="" disabled selected>
                Select role
              </option>

              <option value="admin">Admin</option>
              <option value="doctor">Doctor</option>
              <option value="nurse">Nurse</option>
              <option value="reception">Reception</option>
            </select>

            <label>Role</label>
          </div>

          <button class="btn teal" type="submit">
            Create Staff
          </button>

        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-content">

        <span class="card-title">Staff List</span>

        <table class="striped">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="staffTable">
            <tr>
              <td colspan="4">Loading...</td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </main>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js">
  </script>

  <script src="/js/navbar.js"></script>
  <script src="/js/staff.js"></script>

</body>
</html>
