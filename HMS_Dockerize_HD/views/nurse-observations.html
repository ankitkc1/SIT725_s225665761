<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nurse Observations | HMS</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="teal darken-2 hms-navbar">
    <div class="nav-wrapper container">
      <a href="/dashboard" class="brand-logo">HMS</a>
      <ul id="mainNavLinks" class="right hms-nav-links"></ul>
    </div>
  </nav>

  <main class="container">
    <h4>Nurse Observations</h4>

    <div class="card">
      <div class="card-content">
        <span class="card-title">Add Observation</span>

        <form id="observationForm">
          <div class="input-field">
            <input id="patientId" type="text" required />
            <label for="patientId">Patient Mongo ID</label>
          </div>

          <div class="input-field">
            <textarea id="observation" class="materialize-textarea" required></textarea>
            <label for="observation">Observation</label>
          </div>

          <div class="input-field">
            <textarea id="careNote" class="materialize-textarea" required></textarea>
            <label for="careNote">Care Note</label>
          </div>

          <div class="input-field">
            <input id="temperature" type="text" />
            <label for="temperature">Temperature</label>
          </div>

          <div class="input-field">
            <input id="bloodPressure" type="text" />
            <label for="bloodPressure">Blood Pressure</label>
          </div>

          <div class="input-field">
            <input id="heartRate" type="text" />
            <label for="heartRate">Heart Rate</label>
          </div>

          <div class="input-field">
            <input id="oxygenSaturation" type="text" />
            <label for="oxygenSaturation">Oxygen Saturation</label>
          </div>

          <button class="btn teal darken-2" type="submit">Save Observation</button>
        </form>
      </div>
    </div>

    <div id="message"></div>
  </main>

  <script src="/js/navbar.js"></script>
  <script src="/js/nurse-observations.js"></script>
  <script src="/js/session-timeout.js"></script>
</body>
</html>
