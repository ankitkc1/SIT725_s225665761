<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Appointment | HMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link rel="stylesheet" href="/style.css" />

</head>

<body class="grey lighten-4">
  <nav class="teal darken-2 hms-navbar">
    <div class="nav-wrapper container">
      <a href="/dashboard" class="brand-logo">HMS</a>

      <ul id="mainNavLinks" class="right hms-nav-links"></ul>
    </div>
  </nav>

  <main class="container" style="margin-top: 35px;">
    <div class="card">
      <div class="card-content">
        <span class="card-title">Create Appointment</span>
        <p class="grey-text text-darken-1">
          Schedule a patient with the correct doctor.
        </p>

        <div id="message" style="margin-top: 20px;"></div>

        <form id="appointmentForm" style="margin-top: 25px;">
          <div class="input-field">
            <select id="patient" name="patient" required>
              <option value="" disabled selected>Select patient</option>
            </select>
            <label>Patient</label>
          </div>

          <div class="input-field">
            <select id="doctor" name="doctor" required>
              <option value="" disabled selected>Select doctor</option>
            </select>
            <label>Doctor</label>
          </div>

          <div class="input-field">
            <input id="appointmentDate" name="appointmentDate" type="datetime-local" step="900" required />
            <label class="active" for="appointmentDate">Appointment Date & Time</label>
            <span id="appointmentDateHelp" class="helper-text"></span>
          </div>

          <div id="availabilityPanel" class="availability-panel"></div>

          <div class="input-field">
            <textarea id="reason" name="reason" class="materialize-textarea" required></textarea>
            <label for="reason">Reason</label>
          </div>

          <button id="createAppointmentButton" class="btn teal" type="submit">
            <i class="material-icons left">event_available</i>
            Create Appointment
          </button>

          <a href="/appointments" class="btn-flat">Cancel</a>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <script src="/js/navbar.js"></script>
  <script src="/js/appointment_create.js"></script>

</body>
</html>
