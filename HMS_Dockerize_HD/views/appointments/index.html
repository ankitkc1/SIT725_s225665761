<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Appointments | HMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="grey lighten-4">
  <nav class="teal darken-2 hms-navbar">
    <div class="nav-wrapper container">
      <a href="/dashboard" class="brand-logo">HMS</a>

      <ul id="mainNavLinks" class="right hms-nav-links"></ul>
    </div>
  </nav>

  <main class="container" style="margin-top: 35px;">
    <div class="row">
      <div class="col s12 m8">
        <h4>Appointments</h4>
        <p class="grey-text text-darken-1">
          Reception can manage bookings. Doctors can view their scheduled patient visits.
        </p>
      </div>

      <div class="col s12 m4 right-align" id="bookButtonWrap" style="display:none; margin-top: 25px;">
        <a href="/appointments/new" class="btn teal">
          <i class="material-icons left">add</i>
          Book Appointment
        </a>
      </div>
    </div>

    <div id="message"></div>

    <div class="card">
      <div class="card-content">
        <table class="striped responsive-table">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Date & Time</th>
              <th>Reason</th>
              <th>Status</th>
              <th class="status-action">Action</th>
            </tr>
          </thead>

          <tbody id="appointmentsTable">
            <tr>
              <td colspan="6">Loading appointments...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

    <script src="/js/navbar.js"></script>
    <script src="/js/appointment_index.js"></script>
</body>
</html>
