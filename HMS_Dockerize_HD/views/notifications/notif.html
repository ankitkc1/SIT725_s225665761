<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notify Staff | HMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="grey lighten-4">
  <nav class="teal darken-2 hms-navbar">
    <div class="nav-wrapper container">
      <a href="/dashboard" class="brand-logo">HMS</a>

      <ul id="mainNavLinks" class="right hms-nav-links"></ul>
    </div>
  </nav>

  <main class="container dashboard-container">
    <div class="row">
      <div class="col s12 m8">
        <h4>Notify Staff</h4>
        <p class="grey-text text-darken-1">
          Send a realtime message to all staff or selected staff members.
        </p>
      </div>
    </div>

    <div id="notificationMessage" class="message-box" style="display: none;"></div>

    <div class="card z-depth-1">
      <div class="card-content">
        <span class="card-title">New Notification</span>

        <form id="notificationForm" novalidate>
          <div class="input-field">
            <select id="audience" name="audience">
              <option value="all" selected>All staff</option>
              <option value="selected">Selected staff</option>
            </select>
            <label>Send To</label>
          </div>

          <div id="staffPicker" class="notification-staff-picker" hidden>
            <div class="notification-picker-heading">
              <strong>Choose staff members</strong>
              <button id="selectAllStaff" type="button" class="btn-flat teal-text text-darken-2">
                Select all
              </button>
            </div>

            <div id="staffOptions" class="notification-staff-options">
              Loading staff...
            </div>

            <span id="recipientsError" class="helper-text red-text"></span>
          </div>

          <div class="input-field">
            <input id="title" name="title" type="text" maxlength="120" required />
            <label for="title">Title *</label>
            <span id="titleError" class="helper-text red-text"></span>
          </div>

          <div class="input-field">
            <textarea id="message" name="message" class="materialize-textarea" maxlength="1000" required></textarea>
            <label for="message">Message *</label>
            <span id="messageError" class="helper-text red-text"></span>
          </div>

          <button id="sendNotificationButton" class="btn teal darken-2 waves-effect waves-light" type="submit">
            Send Notification
            <i class="material-icons right">send</i>
          </button>

          <a href="/dashboard" class="btn-flat">Cancel</a>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/session-timeout.js"></script>
</body>
</html>
