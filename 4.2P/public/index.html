<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plant Hub | SIT 725 | 3.2P</title>
  <meta name="description" content="Plant theme web application for SIT 725" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav>
    <div class="nav-wrapper navbar-size green darken-2">
      <a href="#" class="brand-logo">Plant Hub</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li><a href="#">Home</a></li>
        <li><a href="https://github.com/ankitkc1/SIT725_s225665761" target="_blank"> My Github</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-body">
    <div class="container">
      <div class="row hero-section">
        <div class="col s12 center-align">
          <h2 id="heading">Welcome to Plant Hub</h2>
          <p class="flow-text">
            This web shows a list of indoor plants and their details. You can also suggest your favourite plant by clicking the button below.
          </p>
        </div>

        <div class="col s12 center-align">
          <img class="materialboxed materialboxed-image responsive-img" src="images/plant-home.jpg" alt="Indoor plants" />
        </div>

        <div class="col s12 center-align">
          <a class="waves-effect waves-light btn click-me-button modal-trigger" id="clickMeButton" data-target="modal1">
            <i class="material-icons left">spa</i>Suggest a Plant
          </a>
        </div>
      </div>

      <div class="row" id="card-section">
        <!--cards from API will be shown here -->
      </div>
    </div>
  </main>

  <div id="modal1" class="modal modal-fixed-footer">
    <div class="modal-content">
      <h4>Plant Suggestion Form</h4>
      <form id="plantForm">
        <div class="row">
          <div class="input-field col s6">
            <input id="first_name" type="text" class="validate" />
            <label for="first_name">First Name</label>
          </div>

          <div class="input-field col s6">
            <input id="last_name" type="text" class="validate" />
            <label for="last_name">Last Name</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12">
            <input id="email" type="email" class="validate" />
            <label for="email">Email</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12">
            <input id="favourite_plant" type="text" class="validate" />
            <label for="favourite_plant">Favourite Plant</label>
          </div>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <a href="#!" class="modal-close waves-effect waves-red btn-flat">Close</a>
      <a href="#!" class="waves-effect waves-light btn green" id="formSubmit">Submit</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"
    integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
