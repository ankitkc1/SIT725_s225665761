<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Books Catalogue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #fetchBooksBtn {
      background-color: #0b5f7a;
      color: white;
      border: none;
      padding: 10px 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #booksList {
      width: 320px;
      min-height: 120px;
      border: 1px solid #888;
      padding: 10px;
      margin-top: 15px;
      margin-bottom: 25px;
      background: #f5f5f5;
    }

    .book-item {
      cursor: pointer;
      margin-bottom: 8px;
    }

    .book-item:hover {
      text-decoration: underline;
      color: #0b5f7a;
    }

    #bookDetails {
      width: 420px;
      min-height: 160px;
      border: 1px solid #888;
      padding: 15px;
      background: #fafafa;
      white-space: pre-line;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Books Catalogue developed by s225665761</h1>

  <p>Click the button below to get all books from the server:</p>
  <button id="fetchBooksBtn">Get all books</button>

  <div id="booksList"></div>

  <div id="bookDetails">
    Click a book to view its details.
  </div>

  <script>
    const btn = document.getElementById('fetchBooksBtn');
    const booksList = document.getElementById('booksList');
    const bookDetails = document.getElementById('bookDetails');

    function getPriceValue(price) {
      if (typeof price === 'string') return price;
      if (price && price.$numberDecimal) return price.$numberDecimal;
      return '';
    }

    function renderBooks(items) {
      booksList.innerHTML = '';

      if (!Array.isArray(items) || items.length === 0) {
        booksList.textContent = 'No books found';
        return;
      }

      items.forEach((book) => {
        const div = document.createElement('div');
        div.className = 'book-item';
        div.textContent = `${book.title} ${getPriceValue(book.price)} AUD`;

        div.addEventListener('click', async () => {
          try {
            const res = await fetch(`/api/books/${book.id}`);
            const body = await res.json();
            const selectedBook = body.data;

            bookDetails.innerHTML = `
              <div><span class="label">Title:</span> ${selectedBook.title}</div>
              <div><span class="label">Author:</span> ${selectedBook.author}</div>
              <div><span class="label">Year:</span> ${selectedBook.year}</div>
              <div><span class="label">Genre:</span> ${selectedBook.genre}</div>
              <div><span class="label">Summary:</span> ${selectedBook.summary}</div>
              <div><span class="label">Price (AUD):</span> ${getPriceValue(selectedBook.price)}</div>
            `;
          } catch (error) {
            console.error('Error fetching book details:', error);
            bookDetails.textContent = 'Error loading book details.';
          }
        });

        booksList.appendChild(div);
      });
    }

    btn.addEventListener('click', async () => {
      booksList.textContent = 'Loading...';

      try {
        const res = await fetch('/api/books');
        const body = await res.json();
        renderBooks(body.data);
      } catch (error) {
        console.error('Error fetching books:', error);
        booksList.textContent = 'Error loading books.';
      }
    });
  </script>
</body>
</html>
