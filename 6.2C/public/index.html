<body>
  <h1>Calculator</h1>
<!-- Add Two Numbers  -->
  <h2>Add Numbers</h2>
  <form action="/add" method="GET">
    <label for="add-a">Enter first number:</label>
    <input type="number" id="add-a" name="a" step="any" required />
    <br><br>

    <label for="add-b">Enter second number:</label>
    <input type="number" id="add-b" name="b" step="any" required />
    <br><br>

    <button type="submit">Add Numbers</button>
  </form>

  <hr>
<!--rest similar to addition -->

    <input type="number" id="sub-b" name="b" step="any" required />
